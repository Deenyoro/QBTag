name: Build Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore packages
        run: dotnet restore QBTag.sln

      - name: Build Release
        run: msbuild QBTag.sln -p:Configuration=Release -verbosity:minimal

      - name: Stage supporting files
        shell: pwsh
        run: |
          $out = "QBTag\bin\Release\net40"
          Copy-Item "SupportingFiles\Reports\*.rpt" "$out\" -Force
          Copy-Item "SupportingFiles\Config\Product.xml" "$out\" -Force
          Copy-Item "SupportingFiles\Config\QBTag.exe.manifest" "$out\" -Force

      - name: Download prerequisite installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "installer\prereqs" -Force | Out-Null

          # .NET Framework 4.0 offline installer (always needed)
          Invoke-WebRequest -Uri "https://download.microsoft.com/download/9/5/A/95A9616B-7A37-4AF6-BC36-D6EA96C8DAAE/dotNetFx40_Full_x86_x64.exe" `
            -OutFile "installer\prereqs\dotNetFx40_Full_x86_x64.exe" -UseBasicParsing

          # QODBC and QBFC12 are committed to the repo in installer/prereqs/
          # If they exist from checkout, they'll be picked up automatically by QBTag.iss
          if (Test-Path "installer\prereqs\qodbc.exe") {
            Write-Host "QODBC installer found (committed in repo)"
          } else {
            Write-Warning "QODBC installer not found in installer\prereqs\. Installer will build without QODBC option."
          }
          if (Test-Path "installer\prereqs\qbsdk120.exe") {
            Write-Host "QuickBooks SDK 12.0 found (committed in repo)"
          } else {
            Write-Warning "QuickBooks SDK 12.0 not found in installer\prereqs\. Installer will build without QBFC12 option."
            Write-Warning "Place qbsdk120.exe in installer\prereqs\ and commit to include it."
          }

      - name: Build installer
        shell: pwsh
        run: |
          $ver = (git describe --tags --abbrev=0 2>$null) -replace '^v',''
          if (-not $ver) { $ver = "0.0.0" }
          Write-Host "Building installer version: $ver"
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="$ver" installer\QBTag.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: QBTag-Installer
          path: installer/output/QBTag-Setup-*.exe
          retention-days: 90
