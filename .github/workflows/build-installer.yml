name: Build Installer

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore packages
        run: dotnet restore QBTag.sln

      - name: Build Release
        run: msbuild QBTag.sln -p:Configuration=Release -verbosity:minimal

      - name: Stage supporting files
        shell: pwsh
        run: |
          $out = "QBTag\bin\Release\net40"
          Copy-Item "SupportingFiles\Reports\*.rpt" "$out\" -Force
          Copy-Item "SupportingFiles\Config\Product.xml" "$out\" -Force
          Copy-Item "SupportingFiles\Config\QBTag.exe.manifest" "$out\" -Force

      - name: Download prerequisites
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "installer\prereqs" -Force | Out-Null

          # Download .NET Framework 4.0 Full offline installer
          Write-Host "Downloading .NET Framework 4.0..."
          Invoke-WebRequest -Uri "https://download.microsoft.com/download/9/5/A/95A9616B-7A37-4AF6-BC36-D6EA96C8DAAE/dotNetFx40_Full_x86_x64.exe" `
            -OutFile "installer\prereqs\dotNetFx40_Full_x86_x64.exe" -UseBasicParsing
          $size = (Get-Item "installer\prereqs\dotNetFx40_Full_x86_x64.exe").Length / 1MB
          Write-Host "  Downloaded: $([math]::Round($size, 1)) MB"

          # Download Crystal Reports Runtime 13.0.35 (32-bit) for .NET 4.0
          Write-Host "Downloading Crystal Reports Runtime..."
          Invoke-WebRequest -Uri "https://origin.softwaredownloads.sap.com/public/file/0020000000607122021" `
            -OutFile "installer\prereqs\CRRuntime_32bit_13_0_35.msi" -UseBasicParsing
          $crFile = Get-Item "installer\prereqs\CRRuntime_32bit_13_0_35.msi"
          $size = $crFile.Length / 1MB
          Write-Host "  Downloaded: $([math]::Round($size, 1)) MB"

          # Verify CR download is an MSI (not an HTML redirect page)
          $header = [System.IO.File]::ReadAllBytes($crFile.FullName)[0..3]
          $msiMagic = @(0xD0, 0xCF, 0x11, 0xE0)
          $isMSI = ($header[0] -eq $msiMagic[0]) -and ($header[1] -eq $msiMagic[1]) -and ($header[2] -eq $msiMagic[2]) -and ($header[3] -eq $msiMagic[3])

          if (-not $isMSI) {
            Write-Host "  WARNING: SAP download requires authentication. Using NuGet CR DLLs instead."
            Write-Host "  The bundled Crystal Reports managed DLLs will be used (already in build output)."
            # Create a tiny dummy MSI so Inno Setup doesn't fail on missing file
            # The installer [Code] section will skip installing it since CR DLLs are already bundled
            [System.IO.File]::WriteAllBytes("installer\prereqs\CRRuntime_32bit_13_0_35.msi", @(0xD0, 0xCF, 0x11, 0xE0, 0xA1, 0xB1, 0x1A, 0xE1))
          } else {
            Write-Host "  Crystal Reports MSI verified OK"
          }

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: installer/QBTag.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: QBTag-Installer
          path: installer/output/QBTag-Setup-*.exe
          retention-days: 90
