name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore packages
        run: dotnet restore QBTag.sln

      - name: Build Release
        run: msbuild QBTag.sln -p:Configuration=Release -verbosity:minimal

      - name: Stage supporting files
        shell: pwsh
        run: |
          $out = "QBTag\bin\Release\net40"
          Copy-Item "SupportingFiles\Reports\*.rpt" "$out\" -Force
          Copy-Item "SupportingFiles\Config\Product.xml" "$out\" -Force
          Copy-Item "SupportingFiles\Config\QBTag.exe.manifest" "$out\" -Force

      - name: Download .NET Framework 4.0 installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "installer\prereqs" -Force | Out-Null
          Write-Host "Downloading .NET Framework 4.0 offline installer..."
          Invoke-WebRequest -Uri "https://download.microsoft.com/download/9/5/A/95A9616B-7A37-4AF6-BC36-D6EA96C8DAAE/dotNetFx40_Full_x86_x64.exe" `
            -OutFile "installer\prereqs\dotNetFx40_Full_x86_x64.exe" -UseBasicParsing
          $size = (Get-Item "installer\prereqs\dotNetFx40_Full_x86_x64.exe").Length / 1MB
          Write-Host "  Downloaded: $([math]::Round($size, 1)) MB"

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.7
        with:
          path: installer/QBTag.iss

      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path "QBTag\bin\Release\net40\*" -DestinationPath "QBTag-${{ github.ref_name }}-portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/output/QBTag-Setup-*.exe
            QBTag-${{ github.ref_name }}-portable.zip
          generate_release_notes: true
          body: |
            ## QBTag ${{ github.ref_name }}

            ### Downloads
            - **`QBTag-Setup-3.0.0.exe`** — Full installer (recommended)
            - **`QBTag-${{ github.ref_name }}-portable.zip`** — Portable zip

            ### What the installer does
            1. Installs .NET Framework 4.0 automatically if not present
            2. Installs QBTag with all DLLs and Crystal Reports to Program Files
            3. Creates Start Menu + Desktop shortcuts
            4. Includes uninstaller

            ### Requirements
            - Windows 7 SP1 or later
            - QuickBooks Desktop with QBFC12 SDK
