name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore packages
        run: dotnet restore QBTag.sln

      - name: Build Release
        run: msbuild QBTag.sln -p:Configuration=Release -verbosity:minimal

      - name: Stage supporting files
        shell: pwsh
        run: |
          $out = "QBTag\bin\Release\net40"
          Copy-Item "SupportingFiles\Reports\*.rpt" "$out\" -Force
          Copy-Item "SupportingFiles\Config\Product.xml" "$out\" -Force
          Copy-Item "SupportingFiles\Config\QBTag.exe.manifest" "$out\" -Force

      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer/QBTag.iss

      - name: Create portable zip
        shell: pwsh
        run: |
          $out = "QBTag\bin\Release\net40"
          Compress-Archive -Path "$out\*" -DestinationPath "QBTag-${{ github.ref_name }}-portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/output/QBTag-Setup-*.exe
            QBTag-${{ github.ref_name }}-portable.zip
          generate_release_notes: true
          body: |
            ## QBTag ${{ github.ref_name }}

            ### Downloads
            - **`QBTag-Setup-*.exe`** — Full installer (recommended)
            - **`QBTag-*-portable.zip`** — Portable/extract-and-run

            ### Requirements
            - Windows 7 SP1 or later
            - .NET Framework 4.0 (installer checks for this)
            - QuickBooks Desktop with QBFC12 SDK

            Crystal Reports is bundled — no separate install needed.
