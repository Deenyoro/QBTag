name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set assembly versions from tag
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v") + ".0"
          Write-Host "Setting assembly version to $ver"
          Get-ChildItem -Recurse -Filter "AssemblyInfo.cs" | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace 'AssemblyVersion\("[^"]*"\)', "AssemblyVersion(`"$ver`")"
            $content = $content -replace 'AssemblyFileVersion\("[^"]*"\)', "AssemblyFileVersion(`"$ver`")"
            Set-Content $_.FullName $content
          }

      - name: Restore packages
        run: dotnet restore QBTag.sln

      - name: Build Release
        run: msbuild QBTag.sln -p:Configuration=Release -verbosity:minimal

      - name: Stage supporting files
        shell: pwsh
        run: |
          $out = "QBTag\bin\Release\net40"
          Copy-Item "SupportingFiles\Reports\*.rpt" "$out\" -Force
          Copy-Item "SupportingFiles\Config\Product.xml" "$out\" -Force
          Copy-Item "SupportingFiles\Config\QBTag.exe.manifest" "$out\" -Force

      - name: Download prerequisite installers
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "installer\prereqs" -Force | Out-Null

          # .NET Framework 4.0 offline installer
          Invoke-WebRequest -Uri "https://download.microsoft.com/download/9/5/A/95A9616B-7A37-4AF6-BC36-D6EA96C8DAAE/dotNetFx40_Full_x86_x64.exe" `
            -OutFile "installer\prereqs\dotNetFx40_Full_x86_x64.exe" -UseBasicParsing

          # QODBC and QBFC12 are committed to the repo in installer/prereqs/
          if (Test-Path "installer\prereqs\qodbc.exe") {
            Write-Host "QODBC installer found (committed in repo)"
          } else {
            Write-Warning "QODBC installer not found. Release installer will not include QODBC option."
          }
          if (Test-Path "installer\prereqs\qbsdk120.exe") {
            Write-Host "QuickBooks SDK 12.0 found (committed in repo)"
          } else {
            Write-Warning "QuickBooks SDK 12.0 not found. Release installer will not include QBFC12 option."
          }

      - name: Build installer
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart("v")
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion="$ver" installer\QBTag.iss

      - name: Create portable zip
        shell: pwsh
        run: |
          Compress-Archive -Path "QBTag\bin\Release\net40\*" -DestinationPath "QBTag-${{ github.ref_name }}-portable.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installer/output/QBTag-Setup-*.exe
            QBTag-${{ github.ref_name }}-portable.zip
          generate_release_notes: true
          body: |
            ## QBTag ${{ github.ref_name }}

            ### Downloads
            - **`QBTag-Setup-*.exe`** — Full installer (recommended)
            - **`QBTag-*-portable.zip`** — Portable zip

            ### What the installer does
            1. Installs .NET Framework 4.0 automatically if not present
            2. Optionally installs QBFC12 SDK (required for QuickBooks connection)
            3. Optionally installs QODBC Driver (required for ODBC queries)
            4. Installs QBTag with all DLLs and Crystal Reports to Program Files
            5. Creates Start Menu + Desktop shortcuts
            6. Includes uninstaller

            ### Requirements
            - Windows 7 SP1 or later
            - QuickBooks Desktop
